<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col w-[500px] bg-zinc-900 p-4">
    <div data-testid="hero" class="relative w-[468px] h-[200px] rounded-2xl overflow-hidden">
      <div data-testid="bg-layer" class="absolute inset-0 bg-zinc-700"></div>
      <div data-testid="text-layer" class="absolute inset-0 flex flex-col justify-end p-6 gap-1">
        <span data-testid="eyebrow" class="text-xs text-zinc-400 uppercase">Featured</span>
        <span data-testid="title" class="text-2xl font-bold text-white">Hero Title</span>
        <span data-testid="subtitle" class="text-sm text-zinc-400">A subtitle below</span>
      </div>
    </div>
  </div>
</body>
</html>
