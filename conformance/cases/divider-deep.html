<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-3 w-[500px] bg-zinc-900 p-4">
    <div data-testid="block-a" class="h-[40px] rounded-xl bg-zinc-800"></div>
    <hr data-testid="div-1" class="border-zinc-700 m-0" />
    <div data-testid="block-b" class="h-[40px] rounded-xl bg-zinc-800"></div>
    <hr data-testid="div-2" class="border-zinc-700 m-0" />
    <div data-testid="block-c" class="h-[40px] rounded-xl bg-zinc-800"></div>
    <hr data-testid="div-3" class="border-zinc-700 m-0" />
    <div data-testid="row-after" class="flex flex-row items-center gap-3 h-[36px]">
      <div data-testid="left" class="w-[100px] h-[24px] rounded bg-zinc-800 shrink-0"></div>
      <div data-testid="right" class="flex-1 h-[24px] rounded bg-zinc-800"></div>
    </div>
  </div>
</body>
</html>
