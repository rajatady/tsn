<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-3 w-[400px] bg-zinc-900 p-4">
    <div data-testid="align-left" class="w-[360px] h-[40px] rounded-xl bg-zinc-800 p-2">
      <span data-testid="t-left" class="text-base text-left text-white block">Left aligned text</span>
    </div>
    <div data-testid="align-center" class="w-[360px] h-[40px] rounded-xl bg-zinc-800 p-2">
      <span data-testid="t-center" class="text-base text-center text-white block">Center aligned text</span>
    </div>
    <div data-testid="align-right" class="w-[360px] h-[40px] rounded-xl bg-zinc-800 p-2">
      <span data-testid="t-right" class="text-base text-right text-white block">Right aligned text</span>
    </div>
    <hr data-testid="sep" class="border-zinc-700" />
    <div data-testid="upper-card" class="w-[360px] h-[40px] rounded-xl bg-zinc-800 p-2">
      <span data-testid="t-upper" class="text-xs uppercase tracking-wide text-white">Uppercase eyebrow label</span>
    </div>
    <div data-testid="lower-card" class="w-[360px] h-[40px] rounded-xl bg-zinc-800 p-2">
      <span data-testid="t-lower" class="text-base lowercase text-white">LOWERCASED Text Here</span>
    </div>
  </div>
</body>
</html>
