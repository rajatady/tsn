<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-1 w-[500px] bg-zinc-900 p-4">
    <div data-testid="row-thin" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-thin" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-thin" class="text-lg font-thin text-white">Thin weight</span>
    </div>
    <div data-testid="row-light" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-light" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-light" class="text-lg font-light text-white">Light weight</span>
    </div>
    <div data-testid="row-normal" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-normal" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-normal" class="text-lg font-normal text-white">Normal weight</span>
    </div>
    <div data-testid="row-medium" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-medium" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-medium" class="text-lg font-medium text-white">Medium weight</span>
    </div>
    <div data-testid="row-semibold" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-semibold" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-semibold" class="text-lg font-semibold text-white">Semibold weight</span>
    </div>
    <div data-testid="row-bold" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-bold" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-bold" class="text-lg font-bold text-white">Bold weight</span>
    </div>
    <div data-testid="row-black" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="swatch-black" class="w-[80px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="wt-black" class="text-lg font-black text-white">Black weight</span>
    </div>
  </div>
</body>
</html>
