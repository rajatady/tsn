<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    hr { border: none; border-top: 1px solid #3f3f46; margin: 0; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-row gap-0 w-[600px] bg-zinc-900">
    <div data-testid="col-a" class="flex-1 flex flex-col gap-0">
      <div data-testid="a1" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 1</span></div>
      <hr />
      <div data-testid="a2" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 2</span></div>
      <hr />
      <div data-testid="a3" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 3</span></div>
    </div>
    <div data-testid="col-b" class="flex-1 flex flex-col gap-0">
      <div data-testid="b1" class="h-[48px] rounded-xl bg-zinc-700 p-3"><span class="text-sm text-white">Row 1</span></div>
      <hr />
      <div data-testid="b2" class="h-[48px] rounded-xl bg-zinc-700 p-3"><span class="text-sm text-white">Row 2</span></div>
      <hr />
      <div data-testid="b3" class="h-[48px] rounded-xl bg-zinc-700 p-3"><span class="text-sm text-white">Row 3</span></div>
    </div>
    <div data-testid="col-c" class="flex-1 flex flex-col gap-0">
      <div data-testid="c1" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 1</span></div>
      <hr />
      <div data-testid="c2" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 2</span></div>
      <hr />
      <div data-testid="c3" class="h-[48px] rounded-xl bg-zinc-800 p-3"><span class="text-sm text-white">Row 3</span></div>
    </div>
  </div>
</body>
</html>
