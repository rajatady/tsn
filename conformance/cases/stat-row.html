<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }</style>
</head>
<body>
  <div data-testid="root" class="flex flex-row gap-4 h-[120px] w-[700px] bg-zinc-900 p-3">
    <div data-testid="stat1" class="flex-1 h-[96px] rounded-xl bg-zinc-800 p-4">
      <div class="flex flex-col gap-1">
        <span class="text-xs text-zinc-400">REVENUE</span>
        <span class="text-2xl font-bold text-white">$12.4M</span>
      </div>
    </div>
    <div data-testid="stat2" class="flex-1 h-[96px] rounded-xl bg-zinc-800 p-4">
      <div class="flex flex-col gap-1">
        <span class="text-xs text-zinc-400">USERS</span>
        <span class="text-2xl font-bold text-white">84K</span>
      </div>
    </div>
    <div data-testid="stat3" class="flex-1 h-[96px] rounded-xl bg-zinc-800 p-4">
      <div class="flex flex-col gap-1">
        <span class="text-xs text-zinc-400">UPTIME</span>
        <span class="text-2xl font-bold text-white">99.9%</span>
      </div>
    </div>
  </div>
</body>
</html>
