<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    hr { border: none; border-left: 1px solid #3f3f46; height: 40px; margin: 0; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-row items-center py-4 w-[600px] bg-zinc-900">
    <div data-testid="m1" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xs text-zinc-400">RATINGS</span>
      <span data-testid="m1-val" class="text-2xl font-bold text-white">4.8</span>
      <span class="text-xs text-zinc-400">out of 5</span>
    </div>
    <hr />
    <div data-testid="m2" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xs text-zinc-400">AGE</span>
      <span data-testid="m2-val" class="text-2xl font-bold text-white">12+</span>
      <span class="text-xs text-zinc-400">Years Old</span>
    </div>
    <hr />
    <div data-testid="m3" class="flex-1 flex flex-col items-center gap-1">
      <span class="text-xs text-zinc-400">SIZE</span>
      <span data-testid="m3-val" class="text-2xl font-bold text-white">245</span>
      <span class="text-xs text-zinc-400">MB</span>
    </div>
  </div>
</body>
</html>
