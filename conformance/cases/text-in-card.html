<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[500px] bg-zinc-900 p-4">
    <div data-testid="card-simple" class="rounded-2xl bg-zinc-800 p-5">
      <div data-testid="inner-simple" class="flex flex-col gap-2">
        <span data-testid="eyebrow-1" class="text-xs text-zinc-400 uppercase tracking-wide">Category</span>
        <span data-testid="heading-1" class="text-2xl font-bold tracking-tight text-white">Section heading</span>
        <span data-testid="body-1" class="text-sm text-zinc-400">Supporting body text that provides context</span>
      </div>
    </div>
    <div data-testid="card-hero" class="rounded-2xl bg-zinc-800 p-6">
      <div data-testid="inner-hero" class="flex flex-col gap-3">
        <span data-testid="eyebrow-2" class="text-xs text-zinc-400 uppercase tracking-wide">Featured</span>
        <span data-testid="heading-2" class="text-4xl font-semibold leading-tight tracking-tight text-white">Hero heading</span>
        <span data-testid="body-2" class="text-base text-zinc-400 leading-relaxed">Body copy below the heading.</span>
      </div>
    </div>
    <div data-testid="card-compact" class="rounded-xl bg-zinc-800 px-4 py-3">
      <div data-testid="inner-compact" class="flex flex-row items-center gap-3">
        <div data-testid="avatar" class="w-[40px] h-[40px] rounded-full bg-zinc-700 shrink-0"></div>
        <div data-testid="compact-text" class="flex-1 flex flex-col gap-0">
          <span data-testid="name" class="text-sm font-semibold text-white">User Name</span>
          <span data-testid="meta" class="text-xs text-zinc-500">2 hours ago</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
