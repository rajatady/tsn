<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
    /* NSProgressIndicator bar: ~6px intrinsic height on macOS, fills container width */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgb(60,60,62);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: rgb(0,122,255);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[500px] bg-zinc-900 p-4">
    <div data-testid="card-25" class="flex flex-col gap-2 p-4 rounded-xl bg-zinc-800">
      <span class="text-sm text-zinc-400">25%</span>
      <div data-testid="bar-25" class="progress-bar"><div class="progress-fill" style="width: 25%;"></div></div>
    </div>
    <div data-testid="card-50" class="flex flex-col gap-2 p-4 rounded-xl bg-zinc-800">
      <span class="text-sm text-zinc-400">50%</span>
      <div data-testid="bar-50" class="progress-bar"><div class="progress-fill" style="width: 50%;"></div></div>
    </div>
    <div data-testid="card-75" class="flex flex-col gap-2 p-4 rounded-xl bg-zinc-800">
      <span class="text-sm text-zinc-400">75%</span>
      <div data-testid="bar-75" class="progress-bar"><div class="progress-fill" style="width: 75%;"></div></div>
    </div>
    <div data-testid="card-100" class="flex flex-col gap-2 p-4 rounded-xl bg-zinc-800">
      <span class="text-sm text-zinc-400">100%</span>
      <div data-testid="bar-100" class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
    </div>
    <div data-testid="row-inline" class="flex flex-row items-center gap-3 h-[36px]">
      <div data-testid="inline-label" class="w-[60px] h-[16px] rounded bg-zinc-800 shrink-0"></div>
      <div data-testid="bar-wrap" class="flex-1 h-[6px] rounded bg-zinc-700"></div>
    </div>
  </div>
</body>
</html>
