<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="relative w-[520px] h-[240px] rounded-2xl bg-zinc-950">
    <div data-testid="hero" class="w-full h-full rounded-2xl bg-zinc-900"></div>
    <div data-testid="badge" class="absolute top-[16px] left-[20px] rounded-full border border-white/20 bg-black/40 px-3 py-1">
      <div data-testid="badge-text" class="text-xs uppercase text-white/80">Overlay</div>
    </div>
    <div data-testid="cta" class="absolute bottom-[18px] right-[18px] w-[96px] h-[40px] rounded-lg bg-white/10"></div>
  </div>
</body>
</html>
