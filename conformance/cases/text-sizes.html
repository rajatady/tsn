<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-2 w-[400px] bg-zinc-900 p-4">
    <div data-testid="row-xs" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="label-xs" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-xs" class="text-xs text-white">Text xs 12px</span>
    </div>
    <div data-testid="row-sm" class="flex flex-row items-center gap-3 h-[28px]">
      <div data-testid="label-sm" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-sm" class="text-sm text-white">Text sm 14px</span>
    </div>
    <div data-testid="row-base" class="flex flex-row items-center gap-3 h-[32px]">
      <div data-testid="label-base" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-base" class="text-base text-white">Text base 16px</span>
    </div>
    <div data-testid="row-lg" class="flex flex-row items-center gap-3 h-[32px]">
      <div data-testid="label-lg" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-lg" class="text-lg text-white">Text lg 18px</span>
    </div>
    <div data-testid="row-xl" class="flex flex-row items-center gap-3 h-[36px]">
      <div data-testid="label-xl" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-xl" class="text-xl text-white">Text xl 20px</span>
    </div>
    <div data-testid="row-2xl" class="flex flex-row items-center gap-3 h-[40px]">
      <div data-testid="label-2xl" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-2xl" class="text-2xl font-bold text-white">Text 2xl 24px</span>
    </div>
    <div data-testid="row-3xl" class="flex flex-row items-center gap-3 h-[48px]">
      <div data-testid="label-3xl" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-3xl" class="text-3xl font-bold text-white">Text 3xl 30px</span>
    </div>
    <div data-testid="row-4xl" class="flex flex-row items-center gap-3 h-[56px]">
      <div data-testid="label-4xl" class="w-[60px] h-[20px] rounded bg-zinc-800 shrink-0"></div>
      <span data-testid="text-4xl" class="text-4xl font-bold text-white">Text 4xl 36px</span>
    </div>
  </div>
</body>
</html>
