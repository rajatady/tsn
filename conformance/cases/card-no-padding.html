<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[400px] bg-zinc-900 p-4">
    <div data-testid="card-bare" class="rounded-xl bg-zinc-800">
      <span data-testid="text-bare" class="text-sm text-white">No padding card</span>
    </div>
    <div data-testid="card-padded" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-padded" class="text-sm text-white">Padded card</span>
    </div>
    <div data-testid="card-thin" class="rounded-xl bg-zinc-700 h-[6px]"></div>
    <div data-testid="card-medium" class="rounded-xl bg-zinc-700 h-[24px]"></div>
  </div>
</body>
</html>
