<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }</style>
</head>
<body>
  <div data-testid="root" class="flex flex-row items-center gap-3 p-3 h-[72px] w-[500px] bg-zinc-900">
    <div data-testid="icon" class="w-[52px] h-[52px] rounded-xl bg-zinc-700 shrink-0"></div>
    <div data-testid="labels" class="flex-1 flex flex-col gap-0">
      <span data-testid="title" class="text-lg font-semibold text-white">Helm for App Store</span>
      <span data-testid="subtitle" class="text-sm text-zinc-400">Manage updates</span>
    </div>
    <div data-testid="action" class="w-[64px] h-[28px] rounded-full bg-zinc-700 shrink-0"></div>
  </div>
</body>
</html>
