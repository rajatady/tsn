<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; background: black; }</style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[500px] bg-zinc-950 p-4">
    <div data-testid="card-p3" class="rounded-xl bg-zinc-800 p-3">
      <div data-testid="inner-p3" class="h-[30px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-p5" class="rounded-xl bg-zinc-800 p-5">
      <div data-testid="inner-p5" class="h-[30px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-px4-py2" class="rounded-xl bg-zinc-800 px-4 py-2">
      <div data-testid="inner-px4" class="h-[30px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-r-sm" class="rounded-sm bg-zinc-800 p-3">
      <div data-testid="inner-r-sm" class="h-[20px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-r-2xl" class="rounded-2xl bg-zinc-800 p-3">
      <div data-testid="inner-r-2xl" class="h-[20px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-shadow" class="rounded-xl bg-zinc-800 p-4 shadow-lg">
      <div data-testid="inner-shadow" class="h-[30px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-hex" class="rounded-xl bg-[#2F2823] p-4">
      <div data-testid="inner-hex" class="h-[30px] rounded bg-zinc-700"></div>
    </div>
    <div data-testid="card-nested" class="rounded-2xl bg-zinc-800 p-4">
      <div data-testid="nested-inner" class="flex flex-col gap-3">
        <div data-testid="nested-a" class="rounded-xl bg-zinc-700 p-3">
          <div data-testid="deep-a" class="h-[24px] rounded bg-zinc-600"></div>
        </div>
        <div data-testid="nested-b" class="rounded-xl bg-zinc-700 p-3">
          <div data-testid="deep-b" class="h-[24px] rounded bg-zinc-600"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
