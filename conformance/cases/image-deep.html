<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[600px] h-[560px] bg-zinc-900 p-4">
    <div data-testid="row-sizes" class="flex flex-row items-center gap-4 h-[96px]">
      <img data-testid="img-sm" src="../../examples/native-gui/app-store/assets/icon-dredge.png" class="w-[40px] h-[40px] rounded-lg object-cover" />
      <img data-testid="img-md" src="../../examples/native-gui/app-store/assets/icon-dredge.png" class="w-[64px] h-[64px] rounded-xl object-cover" />
      <img data-testid="img-lg" src="../../examples/native-gui/app-store/assets/icon-dredge.png" class="w-[96px] h-[96px] rounded-2xl object-cover" />
    </div>
    <img data-testid="img-wide" src="../../examples/native-gui/app-store/assets/develop-hero.png" class="w-[568px] h-[200px] rounded-2xl object-cover" />
    <div data-testid="row-icon-text" class="flex flex-row items-center gap-3 h-[56px]">
      <img data-testid="icon-in-row" src="../../examples/native-gui/app-store/assets/icon-dredge.png" class="w-[52px] h-[52px] rounded-xl shrink-0 object-cover" />
      <div data-testid="text-col" class="flex-1 flex flex-col gap-0">
        <span class="text-lg font-semibold text-white">App Name</span>
        <span class="text-sm text-zinc-400">Description</span>
      </div>
      <div data-testid="action-in-row" class="w-[64px] h-[28px] rounded-full bg-zinc-700 shrink-0"></div>
    </div>
    <div data-testid="row-scaling" class="flex flex-row gap-4 h-[140px]">
      <div data-testid="col-cover" class="flex flex-col gap-1 w-[180px]">
        <img data-testid="img-cover" src="../../examples/native-gui/app-store/assets/develop-hero.png" class="w-[180px] h-[120px] rounded-xl object-cover" />
        <span class="text-xs text-zinc-400">cover</span>
      </div>
      <div data-testid="col-contain" class="flex flex-col gap-1 w-[180px]">
        <img data-testid="img-contain" src="../../examples/native-gui/app-store/assets/develop-hero.png" class="w-[180px] h-[120px] rounded-xl object-contain" />
        <span class="text-xs text-zinc-400">contain</span>
      </div>
    </div>
  </div>
</body>
</html>
