<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-3 w-[500px] bg-zinc-900 p-4">
    <div data-testid="card-none" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-none" class="text-2xl font-semibold leading-none text-white">Leading none: tight heading text</span>
    </div>
    <div data-testid="card-tight" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-tight" class="text-2xl font-semibold leading-tight text-white">Leading tight: slightly more space</span>
    </div>
    <div data-testid="card-snug" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-snug" class="text-2xl font-semibold leading-snug text-white">Leading snug: a comfortable reading</span>
    </div>
    <div data-testid="card-normal" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-normal" class="text-2xl font-semibold leading-normal text-white">Leading normal: default browser line</span>
    </div>
    <div data-testid="card-relaxed" class="rounded-xl bg-zinc-800 p-4">
      <span data-testid="text-relaxed" class="text-2xl font-semibold leading-relaxed text-white">Leading relaxed: spacious reading</span>
    </div>
  </div>
</body>
</html>
