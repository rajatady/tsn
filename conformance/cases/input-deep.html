<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
    /* Approximate native input heights: NSSearchField ~28px, NSTextField ~24px */
    .native-search { height: 28px; border-radius: 6px; background: rgb(50,50,52); border: 1px solid rgb(70,70,72); font-size: 13px; padding: 0 8px; color: white; }
    .native-input { height: 24px; border-radius: 6px; background: transparent; border: 1px solid rgb(80,80,82); font-size: 13px; padding: 0 6px; color: white; }
  </style>
</head>
<body>
  <div data-testid="root" class="flex flex-col gap-4 w-[500px] h-[340px] bg-zinc-900 p-4">
    <div data-testid="row-search" class="flex flex-row items-center gap-3 h-[36px]">
      <span class="text-sm text-zinc-400 shrink-0">Search:</span>
      <input data-testid="search-w200" type="search" placeholder="Search items..." class="native-search w-[200px]" />
    </div>
    <div data-testid="row-search-wide" class="flex flex-row items-center gap-3 h-[36px]">
      <span class="text-sm text-zinc-400 shrink-0">Wide:</span>
      <input data-testid="search-w350" type="search" placeholder="Wide search..." class="native-search w-[350px]" />
    </div>
    <hr data-testid="sep" class="border-zinc-700" />
    <div data-testid="row-input" class="flex flex-row items-center gap-3 h-[36px]">
      <span class="text-sm text-zinc-400 shrink-0">Input:</span>
      <input data-testid="input-w200" type="text" placeholder="Enter text..." class="native-input w-[200px]" />
    </div>
    <div data-testid="row-input-wide" class="flex flex-row items-center gap-3 h-[36px]">
      <span class="text-sm text-zinc-400 shrink-0">Wide:</span>
      <input data-testid="input-w350" type="text" placeholder="Wide input..." class="native-input w-[350px]" />
    </div>
    <hr data-testid="sep2" class="border-zinc-700" />
    <div data-testid="row-combined" class="flex flex-row items-center gap-3 h-[36px]">
      <input data-testid="search-combo" type="search" placeholder="Filter..." class="native-search w-[180px]" />
      <div data-testid="spacer-card" class="flex-1 h-[28px] rounded bg-zinc-800"></div>
      <div data-testid="action-card" class="w-[60px] h-[28px] rounded-full bg-zinc-700 shrink-0"></div>
    </div>
  </div>
</body>
</html>
